<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.text {
    font-size: 2.5rem;
    opacity: 0;
    transition: 1s;
    text-align: center;
    max-width: 80%;
}

.main-img {
    width: 300px;
    border-radius: 15px;
    margin-top: 20px;
    opacity: 0;
    transition: 1s;
}

.grid {
    position: relative;
    width: 400px;
    height: 400px;
}

.grid img {
    position: absolute;
    width: 90px;
    height: 90px;
    object-fit: cover;
    border-radius: 10px;
    opacity: 0;
    transition: 1s;
}

.g1 { top: 0; left: 150px; }
.g2 { top: 50px; left: 300px; }
.g3 { top: 150px; left: 310px; }
.g4 { top: 300px; left: 200px; }
.g5 { top: 300px; left: 50px; }
.g6 { top: 150px; left: 0; }
.g7 { top: 50px; left: 50px; }
.g8 { top: 200px; left: 150px; }

.h1 { top: 0; left: 150px; }
.h2 { top: 80px; left: 300px; }
.h3 { top: 250px; left: 280px; }
.h4 { top: 300px; left: 120px; }
.h5 { top: 250px; left: 0; }
.h6 { top: 80px; left: 0; }

button {
    margin-top: 30px;
    padding: 10px 25px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
}

button:hover {
    background: white;
    color: black;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <div id="text" class="text"></div>

    <img id="singleImage" class="main-img" src="">

    <div id="grid8" class="grid">
        <img src="photo1.jpg" class="g1">
        <img src="photo2.jpg" class="g2">
        <img src="photo3.jpg" class="g3">
        <img src="photo4.jpg" class="g4">
        <img src="photo5.jpg" class="g5">
        <img src="photo6.jpg" class="g6">
        <img src="photo7.jpg" class="g7">
        <img src="photo8.jpg" class="g8">
    </div>

    <div id="grid6" class="grid">
        <img src="h1.jpg" class="h1">
        <img src="h2.jpg" class="h2">
        <img src="h3.jpg" class="h3">
        <img src="h4.jpg" class="h4">
        <img src="h5.jpg" class="h5">
        <img src="h6.jpg" class="h6">
    </div>

    <button onclick="next()">CLICK HERE CUTIE</button>
</div>

<script>
let step = 0;

const scenes = [
    { text: "You exist." },
    { text: "And that's why somehow… life got better." },

    { text: "This moment?", type: "grid8" },
    { text: "Still one of my favorites." },

    { text: "We’ve been through chaos." },
    { text: "And I know that time is recently not fair with you." },
    { text: "But believe me everything will be fine and I'll be there to cheer you fullest." },

    { text: "So yeah…" },

    { text: "Happy Birthday Alishuu.", type: "grid6" },

    { text: "Stay exactly who you are." },

    { text: "And don't forget I LOB U MY BESTIE.", img: "bestie.jpg" },

    { text: "You make life less boring." },
    { text: "And that’s rare." }
];

function hideAll() {
    document.getElementById("singleImage").style.opacity = 0;

    document.querySelectorAll(".grid img").forEach(img => {
        img.style.opacity = 0;
    });
}

function showGrid(id) {
    const imgs = document.querySelectorAll("#" + id + " img");
    imgs.forEach((img, i) => {
        setTimeout(() => {
            img.style.opacity = 1;
        }, i * 120);
    });
}

function next() {
    const music = document.getElementById("bgMusic");

    if (step === 0) {
        music.play();
    }

    if (step < scenes.length) {
        const t = document.getElementById("text");
        const single = document.getElementById("singleImage");

        t.style.opacity = 0;
        hideAll();

        setTimeout(() => {
            const scene = scenes[step];

            t.innerText = scene.text;
            t.style.opacity = 1;

            if (scene.type === "grid8") {
                showGrid("grid8");
            }

            if (scene.type === "grid6") {
                showGrid("grid6");
            }

            if (scene.img) {
                single.src = scene.img;
                single.style.opacity = 1;
            }

            step++;
        }, 500);
    } else {
    document.body.innerHTML = `
    <div class="container">
        <div class="text" style="opacity:1;">
            Now focus on yourself and don't give up,<br>
            you have already come a long way.<br><br>
            Always got you buddy.
        </div>
    </div>`;
}
}
</script>

</body>
</html>
